name: C++ CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-validate:
    name: Code Quality & Tidy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang-tidy ninja-build

      - name: Configure CMake
        run: cmake -B build -S . -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy Analysis
        run: |
          clang-tidy *.cpp -p build --header-filter="include/" --system-headers=false --quiet

  build-and-deploy:
    name: Build & Deploy (${{ matrix.os }})
    needs: lint-and-validate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_path: build/formatted-table
            release_name: formatted-table-linux
          - os: macos-latest
            artifact_path: build/formatted-table
            release_name: formatted-table-macos
          - os: windows-latest
            artifact_path: build/Release/formatted-table.exe
            release_name: formatted-table-windows.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ninja (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then sudo apt-get update && sudo apt-get install -y ninja-build; fi
          if [ "$RUNNER_OS" == "macOS" ]; then brew install ninja; fi

      - name: Configure CMake (Release Mode)
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          else
            cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Compile Target Binary
        run: cmake --build build --config Release

      - name: Execute Automated Tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Prepare Artifact Names
        shell: bash
        run: |
          mkdir -p dist
          cp ${{ matrix.artifact_path }} dist/${{ matrix.release_name }}

      - name: Upload Internal Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.release_name }}
          path: dist/${{ matrix.release_name }}

      - name: Deploy to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.release_name }}
          body: "Automated multi-platform production compilation releases of the formatted-table utility."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
